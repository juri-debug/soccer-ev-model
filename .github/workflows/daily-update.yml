name: Daily model update

on:
  schedule:
    # Runs every day at 06:30 UTC - tweak if you want a different time
    - cron: "30 6 * * *"
  workflow_dispatch:   # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data + retrain models
        run: |
          # Delete in-progress season caches so we re-fetch latest matches
          python -c "
          from pathlib import Path
          import shutil
          raw = Path('data/raw')
          if raw.exists():
              # Wipe only current/next season caches; keep historical
              for f in raw.glob('*_2526.csv'):
                  f.unlink()
              for f in raw.glob('*_2627.csv'):
                  f.unlink()
              intl = raw / 'international_results.csv'
              if intl.exists():
                  intl.unlink()
          "
          python train.py

      - name: Refresh live data (schedules + lineups for Live data tab)
        # ubuntu-latest has Chrome pre-installed, so soccerdata's Selenium path works.
        # Streamlit Cloud doesn't, hence pre-fetching here.
        continue-on-error: true
        run: |
          python scripts/refresh_live_data.py

      - name: Commit updated data + models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed models
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: refreshed data + retrained models"
            git push
          fi
